<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Assistant</title>
  <script src="/static/vendor/tailwind.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "#0f172a",
            panel: "#1e293b",
            "panel-soft": "#273449",
            ink: "#e2e8f0",
            muted: "#94a3b8",
            accent: "#38bdf8",
            income: "#4ade80",
            expense: "#f87171",
            line: "#334155",
          },
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .field {
        @apply px-2.5 py-2 rounded-lg border border-line bg-panel-soft text-ink;
      }
      .field:focus {
        @apply outline outline-2 outline-accent;
      }
      .btn {
        @apply cursor-pointer px-2.5 py-2 rounded-lg border-0 bg-accent font-semibold text-[#06283d] hover:brightness-110;
      }
      .lang-btn {
        @apply cursor-pointer rounded-md border-0 bg-transparent px-1.5 py-0.5 font-semibold text-muted;
      }
      .lang-btn.active {
        @apply bg-panel-soft text-accent;
      }
      .meta {
        @apply text-sm text-muted;
      }
    }
  </style>
</head>
<body class="m-0 bg-bg font-sans leading-normal text-ink">
  <header class="flex flex-wrap items-center justify-between border-b border-line px-8 py-4 max-[760px]:px-4">
    <h1 class="m-0 text-2xl">Budget Assistant</h1>
    <div class="flex flex-wrap items-center gap-6">
      <div class="flex items-center gap-1.5" id="lang-switch">
        <button data-lang="de" class="lang-btn active">DE</button>
        <span class="text-line">|</span>
        <button data-lang="en" class="lang-btn">EN</button>
      </div>
      <div class="flex items-center gap-2">
        <select id="month-select" class="field min-w-28" aria-label="Month"></select>
        <select id="year-select" class="field min-w-28" aria-label="Year"></select>
      </div>
    </div>
  </header>

  <main class="mx-auto w-[90%] max-w-[1500px] px-8 pb-12 pt-6 max-[760px]:w-auto max-[760px]:px-4">
    <section class="mb-6 grid grid-cols-3 gap-4 max-[760px]:grid-cols-1" id="summary-cards">
      <div class="flex flex-col gap-1 rounded-xl border border-line bg-panel px-5 py-4">
        <span class="text-sm text-muted" data-i18n="income">Einnahmen</span>
        <strong class="text-[1.6rem] text-income" id="card-income">–</strong>
      </div>
      <div class="flex flex-col gap-1 rounded-xl border border-line bg-panel px-5 py-4">
        <span class="text-sm text-muted" data-i18n="expenses">Ausgaben</span>
        <strong class="text-[1.6rem] text-expense" id="card-expense">–</strong>
      </div>
      <div class="flex flex-col gap-1 rounded-xl border border-line bg-panel px-5 py-4">
        <span class="text-sm text-muted" data-i18n="balance">Saldo</span>
        <strong class="text-[1.6rem] text-accent" id="card-balance">–</strong>
      </div>
    </section>

    <section class="mb-6 rounded-xl border border-line bg-panel px-6 py-5">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <h2 class="m-0 text-[1.05rem]" data-i18n="analysis">Analyse</h2>
        <p id="classify-status" class="meta"></p>
      </div>
      <div class="mt-4 grid grid-cols-2 gap-6 max-[760px]:grid-cols-1">
        <div>
          <h3 class="m-0 mb-2 text-[0.9rem] font-semibold text-muted" data-i18n="byCategory">Ausgaben nach Kategorie</h3>
          <canvas id="category-chart" class="max-h-[280px]"></canvas>
        </div>
        <div>
          <h3 class="m-0 mb-2 text-[0.9rem] font-semibold text-muted" data-i18n="trendTitle">Verlauf (Einnahmen / Ausgaben)</h3>
          <canvas id="trend-chart" class="max-h-[280px]"></canvas>
        </div>
      </div>
      <div id="category-detail" class="mt-4 hidden rounded-lg border border-line bg-panel-soft px-4 py-3">
        <div class="flex items-center justify-between gap-3">
          <h3 id="category-detail-title" class="m-0 text-[0.95rem] font-semibold"></h3>
          <button id="category-detail-close" class="cursor-pointer border-0 bg-transparent text-muted hover:text-ink" data-i18n="close">Schließen</button>
        </div>
        <ul id="category-detail-list" class="m-0 mt-2 list-none p-0"></ul>
      </div>
    </section>

    <div class="grid grid-cols-2 gap-6 max-[760px]:grid-cols-1">
      <section class="mb-6 rounded-xl border border-line bg-panel px-6 py-5">
        <h2 class="m-0 mb-3 text-[1.05rem]" data-i18n="importTitle">Transaktionen importieren</h2>
        <form id="import-form" class="mb-3 flex flex-wrap items-end gap-3">
          <select id="import-source" class="field flex-none" aria-label="Bank">
            <option value="postbank">Postbank</option>
            <option value="wells-fargo">Wells Fargo</option>
          </select>
          <input type="file" id="import-file" class="field min-w-0 flex-1 p-1.5" accept=".csv,text/csv" required />
          <button type="submit" class="btn flex-none" data-i18n="importBtn">CSV importieren</button>
        </form>
        <p id="import-status" class="meta mb-2 min-h-[1.2em]"></p>

        <h2 class="mb-3 mt-5 text-[1.05rem]" data-i18n="budgetsTitle">Kategorie-Budgets</h2>
        <form id="budget-form" class="mb-3 flex flex-wrap items-end gap-3">
          <select id="budget-category" class="field min-w-0 flex-1" required></select>
          <input type="number" id="budget-limit" class="field min-w-0 flex-1" data-i18n-placeholder="monthlyLimit" placeholder="Monatslimit €" min="0" step="0.01" required />
          <button type="submit" class="btn flex-none" data-i18n="set">Setzen</button>
        </form>
        <ul id="budget-list" class="budget-list m-0 list-none p-0"></ul>
      </section>

      <section class="mb-6 rounded-xl border border-line bg-panel px-6 py-5">
        <div class="grid grid-cols-3 gap-8 max-[760px]:grid-cols-1">
          <div class="col-span-2 min-w-0">
            <h2 class="m-0 mb-3 text-[1.05rem]" id="spending-title" data-i18n="spendingTitle">Ausgaben</h2>
            <ul id="category-breakdown" class="m-0 list-none p-0"></ul>
          </div>
          <div class="min-w-0 border-l border-line pl-8 max-[760px]:border-l-0 max-[760px]:border-t max-[760px]:pl-0 max-[760px]:pt-4">
            <h2 class="m-0 mb-3 text-[1.05rem]" id="income-title" data-i18n="income">Einnahmen</h2>
            <ul id="income-breakdown" class="m-0 list-none p-0"></ul>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="/static/vendor/chart.umd.min.js"></script>
  <script src="/static/app.js?v=6"></script>
</body>
</html>
